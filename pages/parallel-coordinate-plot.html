<meta charset="utf-8">

<!-- Load d3.js -->
<script src="https://d3js.org/d3.v7.js"></script>

<!-- Create a div where the graph will take place -->
<div id="my_dataviz"></div>

<script>

    const dimensions = ["sy_snum", "sy_pnum", "disc_year", "pl_orbper", "pl_orbsmax"];

    d3.csv("../data/nasa_export_small.csv", d => {

        // convert string into int
        dimensions.forEach(dim => {
            d[dim] = d[dim] === "" ? null : +d[dim];
        });

        return d;

    }).then(data => draw(data));

    function draw(data)
    {
        // keep only valid datasets
        data = data.filter(d =>
            dimensions.every(dim => d[dim] != null && !isNaN(d[dim]))
        );

        // SVG Setup
        const margin = { top: 30, right: 50, bottom: 10, left: 50 };
        const width = 800 - margin.left - margin.right;
        const height = 400 - margin.top - margin.bottom;

        const svg = d3.select("#my_dataviz")
            .append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);

        // Y-Axis positions
        const x = d3.scalePoint()
            .domain(dimensions)
            .range([0, width]);

        // Y-Axis data
        const y = {};

        dimensions.forEach(dim => {

            const values = data
                .map(d => d[dim])
                .filter(v => v != null && !isNaN(v));

            const min = d3.min(values);
            const max = d3.max(values);

            const ratio = max / min;

            if (min > 0 && ratio > 100) {

                y[dim] = d3.scaleLog()
                    .domain([min, max])
                    .range([height, 0])
                    .nice();

            } else {

                y[dim] = d3.scaleLinear()
                    .domain([min, max])
                    .range([height, 0])
                    .nice();
            }

        });

        // create Y-Axis
        const axis = d3.axisLeft();

        const g = svg.selectAll(".dimension")
            .data(dimensions)
            .enter()
            .append("g")
            .attr("class", "dimension")
            .attr("transform", d => `translate(${x(d)})`)
            .each(function(dim) {

                d3.select(this)
                    .call(axis.scale(y[dim]));

            });

        // create labels
        g.append("text")
            .attr("y", -10)
            .style("text-anchor", "middle")
            .style("fill", "black")
            .text(d => d);
        const line = d3.line();

        function path(d) {
            return line(dimensions.map(dim => [
                x(dim),
                y[dim](d[dim])
            ]));
        }

        var color = d3.scaleOrdinal()
            .domain(["1", "2", "3", "4", "5"])
            .range([ "#440154ff", "#21908dff", "#fde725ff", "#123456ff", "#abcdefff"])

        svg.selectAll(".line")
            .data(data)
            .enter()
            .append("path")
            .attr("class", "line")
            .attr("d", path)
            .style("fill", "none")
            .style("stroke", function(d){ return( color(d.sy_snum))})
            .style("opacity", 0.8);
    }

</script>
