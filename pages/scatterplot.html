<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exoplanet Scatterplot</title>
    <link rel="stylesheet" href="../styling/scatterplot.css">
    <script src="https://d3js.org/d3.v7.js" defer></script>
    <script src="../scripts/scatterplot.js" defer></script>
</head>
<body>
    <div class="scatterplot-page">
        <div class="scatterplot-header">
            <div class="headline-copy">
                <p class="eyebrow">NASA Exoplanet Archive</p>
                <h1>Scatterplot Explorer</h1>
                <p class="subtitle">
                    Compare two numeric fields from the export and inspect how planets cluster across size, orbit,
                    distance, and discovery history.
                </p>
            </div>
            <div class="header-metric" id="chart-summary">
                <strong>Loading</strong>
                <span>NASA export data</span>
            </div>
        </div>

        <div class="scatterplot-layout">
            <section class="panel plot-panel">
                <div id="my_dataviz"></div>
                <div id="plot-note" class="plot-note">Loading NASA export data and glossary...</div>
            </section>

            <aside class="panel control-panel">
                <div id="controls"></div>

                <div class="color-control" style="margin-top: 20px;">
                    <label class="control-label" for="color-select" style="font-size: 14px; font-weight: bold; color: #8fe3c7; display: block; margin-bottom: 5px;">Point Color</label>
                    <select id="color-select" style="width: 100%; padding: 8px; border-radius: 6px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); margin-bottom: 10px;">
                        <option value="disc_year">Discovery Year</option>
                        <option value="sy_snum">Number of Stars</option>
                        <option value="sy_pnum">System Planet Count</option>
                        <option value="pl_eqt">Equilibrium Temp (K)</option>
                    </select>
                </div>

                <div class="legend" id="dynamic-legend">
                    <!-- populated by JS -->
                </div>
            </aside>
        </div>
    </div>    <div id="tooltip" class="tooltip"></div>
</body>
</html>
